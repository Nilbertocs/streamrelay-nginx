<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destinos — StreamRelay</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="assets/style.css" />

  <style>
    .rtmp-masked {
      font-family: 'JetBrains Mono','Fira Code',monospace;
      font-size: 12px;
      color: var(--text-muted);
    }
    .platform-icon { width: 22px; text-align: center; }

    /* Bootstrap modal backdrop dark fix */
    .modal-backdrop { background-color: rgba(0,0,0,0.7) !important; }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fa-solid fa-tower-broadcast"></i></div>
      StreamRelay
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Principal</span>
      <a href="index.html"    class="nav-link"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
      <a href="streams.html"  class="nav-link"><i class="fa-solid fa-satellite-dish"></i>Destinos</a>
      <a href="fallback.html" class="nav-link"><i class="fa-solid fa-film"></i>Fallback</a>
      <span class="nav-section-label">Sistema</span>
      <a href="settings.html" class="nav-link"><i class="fa-solid fa-gear"></i>Configurações</a>
    </nav>
    <div class="sidebar-footer">v1.0.0</div>
  </aside>

  <!-- ── Main ── -->
  <div class="main-content">

    <header class="top-navbar">
      <span class="navbar-title"><i class="fa-solid fa-satellite-dish me-2 text-muted-sr"></i>Destinos de Stream</span>
      <div class="navbar-right">
        <div class="user-info">
          <div class="user-avatar" id="navbar-user-avatar">U</div>
          <span id="navbar-user-name">Carregando...</span>
        </div>
        <button class="btn-sr btn-sr-ghost" data-action="logout">
          <i class="fa-solid fa-right-from-bracket"></i> Sair
        </button>
      </div>
    </header>

    <main class="page-body">

      <div class="page-header d-flex align-items-center justify-content-between">
        <div>
          <h1>Destinos</h1>
          <p>Gerencie as plataformas para onde o stream será relayado</p>
        </div>
        <button class="btn-sr btn-sr-primary" id="btn-add-stream">
          <i class="fa-solid fa-plus"></i> Adicionar Destino
        </button>
      </div>

      <!-- Alert placeholder -->
      <div id="page-alert" style="display:none;" class="mb-3"></div>

      <!-- Streams table card -->
      <div class="card">
        <div class="table-responsive">
          <table class="table-dark-custom" id="streams-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Plataforma</th>
                <th>RTMP URL</th>
                <th>Status</th>
                <th style="width:120px;text-align:center;">Ações</th>
              </tr>
            </thead>
            <tbody id="streams-tbody">
              <tr>
                <td colspan="5" class="text-center text-muted-sr py-4">
                  <i class="fa-solid fa-spinner fa-spin me-2"></i>Carregando...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- ══════════════════════════════════════
     Add / Edit Stream Modal
══════════════════════════════════════ -->
<div class="modal fade" id="streamModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="streamModalTitle">Adicionar Destino</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <form id="stream-form" novalidate>
        <div class="modal-body">

          <input type="hidden" id="stream-id" value="" />

          <div class="form-group">
            <label class="form-label-sr" for="stream-name">Nome amigável</label>
            <input type="text" class="form-control-sr" id="stream-name"
                   placeholder="Ex: YouTube Principal" required />
          </div>

          <div class="form-group">
            <label class="form-label-sr" for="stream-platform">Plataforma</label>
            <select class="form-control-sr" id="stream-platform" required>
              <option value="">Selecione a plataforma...</option>
              <option value="youtube">YouTube</option>
              <option value="twitch">Twitch</option>
              <option value="facebook">Facebook</option>
              <option value="kick">Kick</option>
              <option value="tiktok">TikTok</option>
              <option value="instagram">Instagram</option>
              <option value="custom">Custom</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label-sr" for="stream-rtmp-url">RTMP URL</label>
            <input type="text" class="form-control-sr" id="stream-rtmp-url"
                   placeholder="rtmp://..." required />
            <div class="mt-1 small text-muted-sr" id="rtmp-preset-hint"></div>
          </div>

          <div class="form-group mb-0">
            <label class="form-label-sr" for="stream-key">Chave de Stream</label>
            <input type="text" class="form-control-sr" id="stream-key"
                   placeholder="Sua stream key" required />
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn-sr btn-sr-ghost" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn-sr btn-sr-primary" id="stream-save-btn">
            <i class="fa-solid fa-floppy-disk"></i> Salvar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/app.js"></script>
<script>
'use strict';

/* ── Platform presets cache ──────────────────────── */
let _presets = {};
let _streams = [];
const streamModal = new bootstrap.Modal(document.getElementById('streamModal'));

/* Fallback built-in presets (used if API not available) */
const DEFAULT_PRESETS = {
  youtube:   { rtmp_url: 'rtmp://a.rtmp.youtube.com/live2', hint: 'Chave: Painel do YouTube Studio' },
  twitch:    { rtmp_url: 'rtmp://live.twitch.tv/app',       hint: 'Chave: Dashboard do Twitch' },
  facebook:  { rtmp_url: 'rtmps://live-api-s.facebook.com:443/rtmp/', hint: 'Chave: Live Producer do Facebook' },
  kick:      { rtmp_url: 'rtmp://fa723fc1b171.global-contribute.live-video.net/app', hint: 'Chave: Dashboard do Kick' },
  tiktok:    { rtmp_url: 'rtmp://push.tiktokv.com/rtmp/',   hint: 'Chave: TikTok Studio' },
  instagram: { rtmp_url: 'rtmps://edgetee-upload-ord1-1.cdninstagram.com:443/rtmp/', hint: 'Chave: Instagram Live' },
  custom:    { rtmp_url: '', hint: 'Insira a URL RTMP manualmente' },
};

const platformLabels = {
  youtube: 'YouTube', twitch: 'Twitch', facebook: 'Facebook',
  kick: 'Kick', tiktok: 'TikTok', instagram: 'Instagram', custom: 'Custom',
};

/* ── Load presets ────────────────────────────────── */
async function loadPresets() {
  try {
    const data = await api('GET', '/api/streams/presets');
    if (data && typeof data === 'object') _presets = data;
    else _presets = DEFAULT_PRESETS;
  } catch (_) {
    _presets = DEFAULT_PRESETS;
  }
}

/* ── Platform dropdown → auto-fill RTMP ─────────── */
document.getElementById('stream-platform').addEventListener('change', function () {
  const val = this.value;
  const preset = _presets[val] || DEFAULT_PRESETS[val] || null;
  const rtmpInput = document.getElementById('stream-rtmp-url');
  const hint      = document.getElementById('rtmp-preset-hint');

  if (preset) {
    if (preset.rtmp_url) rtmpInput.value = preset.rtmp_url;
    hint.textContent = preset.hint || '';
  } else {
    hint.textContent = '';
  }
});

/* ── Render table ────────────────────────────────── */
function renderTable(streams) {
  _streams = streams;
  const tbody = document.getElementById('streams-tbody');

  if (!streams.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted-sr py-4">
      <i class="fa-solid fa-satellite-dish me-2"></i>Nenhum destino configurado ainda.
      <a href="#" id="empty-add-link" class="ms-1">Adicionar agora</a>
    </td></tr>`;
    document.getElementById('empty-add-link')?.addEventListener('click', (e) => {
      e.preventDefault(); openAddModal();
    });
    return;
  }

  tbody.innerHTML = streams.map(s => {
    const masked  = (s.rtmp_url || '').length > 20
      ? s.rtmp_url.substring(0, 20) + '…' : (s.rtmp_url || '—');
    const enabled = !!s.enabled;
    const plat    = platformLabels[s.platform] || s.platform || '—';

    return `<tr data-id="${s.id}">
      <td class="fw-bold">${escHtml(s.name)}</td>
      <td>
        <span class="badge-platform badge-enabled" style="background:rgba(108,99,255,0.12);color:var(--primary);border-color:rgba(108,99,255,0.3);">
          ${escHtml(plat)}
        </span>
      </td>
      <td><span class="rtmp-masked" title="${escHtml(s.rtmp_url || '')}">${escHtml(masked)}</span></td>
      <td>
        <label class="toggle-switch" title="${enabled ? 'Desativar' : 'Ativar'}">
          <input type="checkbox" class="stream-toggle" data-id="${s.id}" ${enabled ? 'checked' : ''} />
          <span class="toggle-slider"></span>
        </label>
      </td>
      <td style="text-align:center;">
        <div style="display:flex;gap:6px;justify-content:center;">
          <button class="btn-sr-icon edit" onclick="openEditModal(${s.id})" title="Editar">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button class="btn-sr-icon delete" onclick="deleteStream(${s.id})" title="Excluir">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  /* Toggle handlers */
  document.querySelectorAll('.stream-toggle').forEach(checkbox => {
    checkbox.addEventListener('change', async function () {
      const id      = this.dataset.id;
      const enabled = this.checked;
      try {
        await api('PATCH', `/api/streams/${id}`, { enabled });
        showToast(enabled ? 'Destino ativado.' : 'Destino desativado.', 'success');
      } catch (_) {
        this.checked = !enabled; /* revert */
      }
    });
  });
}

/* ── Load streams ────────────────────────────────── */
async function loadStreams() {
  try {
    const data = await api('GET', '/api/streams');
    renderTable(Array.isArray(data) ? data : (data?.streams || []));
  } catch (_) { /* handled */ }
}

/* ── Open Add Modal ──────────────────────────────── */
function openAddModal() {
  document.getElementById('streamModalTitle').textContent = 'Adicionar Destino';
  document.getElementById('stream-form').reset();
  document.getElementById('stream-id').value = '';
  document.getElementById('rtmp-preset-hint').textContent = '';
  streamModal.show();
}

/* ── Open Edit Modal ─────────────────────────────── */
function openEditModal(id) {
  const stream = _streams.find(s => s.id === id);
  if (!stream) return;

  document.getElementById('streamModalTitle').textContent = 'Editar Destino';
  document.getElementById('stream-id').value         = stream.id;
  document.getElementById('stream-name').value       = stream.name     || '';
  document.getElementById('stream-platform').value   = stream.platform || '';
  document.getElementById('stream-rtmp-url').value   = stream.rtmp_url || '';
  document.getElementById('stream-key').value        = stream.stream_key || '';

  const preset = _presets[stream.platform] || DEFAULT_PRESETS[stream.platform];
  document.getElementById('rtmp-preset-hint').textContent = preset?.hint || '';

  streamModal.show();
}

/* ── Delete stream ───────────────────────────────── */
async function deleteStream(id) {
  const stream = _streams.find(s => s.id === id);
  const name   = stream?.name || `#${id}`;
  const ok = await confirmDialog(`Excluir o destino "${name}"? Esta ação não pode ser desfeita.`);
  if (!ok) return;
  try {
    await api('DELETE', `/api/streams/${id}`);
    showToast('Destino excluído.', 'warning');
    await loadStreams();
  } catch (_) { /* handled */ }
}

/* ── Form submit (Create / Update) ──────────────── */
document.getElementById('stream-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const id       = document.getElementById('stream-id').value;
  const name     = document.getElementById('stream-name').value.trim();
  const platform = document.getElementById('stream-platform').value;
  const rtmp_url = document.getElementById('stream-rtmp-url').value.trim();
  const stream_key = document.getElementById('stream-key').value.trim();

  if (!name || !platform || !rtmp_url || !stream_key) {
    showToast('Preencha todos os campos obrigatórios.', 'error');
    return;
  }

  const saveBtn = document.getElementById('stream-save-btn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';

  const body = { name, platform, rtmp_url, stream_key };

  try {
    if (id) {
      await api('PUT', `/api/streams/${id}`, body);
      showToast('Destino atualizado com sucesso!', 'success');
    } else {
      await api('POST', '/api/streams', body);
      showToast('Destino adicionado com sucesso!', 'success');
    }
    streamModal.hide();
    await loadStreams();
  } catch (_) { /* handled */ }
  finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Salvar';
  }
});

/* ── Add button ──────────────────────────────────── */
document.getElementById('btn-add-stream').addEventListener('click', openAddModal);

/* ── Escape helper ───────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ── Init ────────────────────────────────────────── */
(async function init() {
  await loadPresets();
  await loadStreams();
})();
</script>
</body>
</html>
