worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application ingest {
            live on;
            record off;

            on_publish      http://panel:3000/hooks/stream-start?secret=${HOOK_SECRET};
            on_publish_done http://panel:3000/hooks/stream-stop?secret=${HOOK_SECRET};

            deny play all;
        }

        application live {
            live on;
            record off;

            allow publish 127.0.0.1;
            allow publish 172.16.0.0/12;
            allow publish 10.0.0.0/8;
            deny publish all;

            include /etc/nginx/conf.d/rtmp-push.conf;
        }
    }
}

http {
    server {
        listen 80;
        return 200 'nginx-rtmp ok';
        add_header Content-Type text/plain;
    }
}
