worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application ingest {
            live on;
            record off;
            wait_key on;
            wait_video on;

            on_publish      http://panel:3000/hooks/stream-start?secret=${HOOK_SECRET};
            on_publish_done http://panel:3000/hooks/stream-stop?secret=${HOOK_SECRET};

            # Allow FFmpeg relay (panel container) to read the stream
            allow play 127.0.0.1;
            allow play 172.16.0.0/12;
            allow play 10.0.0.0/8;
            deny play all;
        }

        application live {
            live on;
            record off;

            allow publish 127.0.0.1;
            allow publish 172.16.0.0/12;
            allow publish 10.0.0.0/8;
            deny publish all;

            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_cleanup on;

            include /etc/nginx/conf.d/rtmp-push.conf;
        }
    }
}

http {
    server {
        listen 80;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location / {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
